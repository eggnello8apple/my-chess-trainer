<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chess Trainer</title>
    <!-- CSS for Layout and Styling -->
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <!-- JavaScript Dependencies -->
    <script src="https://jquery.com"></script>
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>
    
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; background: #312e2b; color: #fff; padding: 20px; }
        #board { width: 400px; max-width: 100%; margin: 20px auto; }
        .dashboard { background: #262421; padding: 15px; border-radius: 8px; width: 400px; max-width: 100%; text-align: center; box-sizing: border-box; }
        button { background: #81b64c; color: white; border: none; padding: 12px 24px; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; width: 100%; user-select: none; }
        button:hover { background: #a3d16c; }
        .coach-feedback { font-style: italic; color: #ffd700; margin-top: 10px; min-height: 20px; }
    </style>
</head>
<body>
    <h1>AI Chess Coach</h1>
    <div id="board"></div>
    <div class="dashboard">
        <h3>Your Training Stats</h3>
        <p>Games Played: <span id="games-count">0</span> | Win Streak: <span id="streak-count">0</span></p>
        <p>AI Difficulty Level: <span id="ai-level">1</span> / 20</p>
        <div class="coach-feedback" id="coach">Drag a white piece to start training!</div>
        <button id="resetBtn">Start New Game</button>
    </div>

    <script>
        let board = null;
        let game = null;
        let stockfish = null;

        // FIX: Safe, polymorphic validation fallback initialization targeting chess.js engine classes
        try {
            if (typeof Chess === 'function') {
                game = new Chess();
            } else if (window.Chess && typeof window.Chess.Chess === 'function') {
                game = new window.Chess.Chess();
            } else {
                game = new window.Chess();
            }
        } catch (err) {
            console.error("Chess logic constructor initialization failed:", err);
        }

        // Bypassing Worker CORS security contexts natively
        try {
            const workerCode = "importScripts('https://cloudflare.com');";
            const blob = new Blob([workerCode], { type: "application/javascript" });
            stockfish = new Worker(URL.createObjectURL(blob));
            stockfish.postMessage('uci');
        } catch (e) {
            console.error("Stockfish worker context loading blocked:", e);
        }

        let stats = { gamesPlayed: 0, winStreak: 0, skillLevel: 1 };

        function loadProgress() {
            const saved = localStorage.getItem('chess_trainer_stats');
            if (saved) { stats = JSON.parse(saved); }
            updateDashboard();
        }

        function saveProgress() {
            localStorage.setItem('chess_trainer_stats', JSON.stringify(stats));
            updateDashboard();
        }

        function updateDashboard() {
            document.getElementById('games-count').innerText = stats.gamesPlayed;
            document.getElementById('streak-count').innerText = stats.winStreak;
            document.getElementById('ai-level').innerText = stats.skillLevel;
        }

        function onDragStart(source, piece, position, orientation) {
            if (!game || game.game_over()) return false;
            if (piece.search(/^b/) !== -1) return false; 
        }

        function onDrop(source, target) {
            if (!game) return 'snapback';
            let move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            window.setTimeout(makeAIMove, 250);
        }

        function onSnapEnd() {
            if (board && game) {
                board.position(game.fen());
                checkGameStatus();
            }
        }

        function makeAIMove() {
            if (!game || game.game_over() || !stockfish) return;

            stockfish.postMessage(`setoption name Skill Level value ${stats.skillLevel}`);
            stockfish.postMessage(`position fen ${game.fen()}`);
            stockfish.postMessage('go depth 8'); 

            stockfish.onmessage = function(event) {
                if (event.data.startsWith('bestmove')) {
                    const parts = event.data.split(' ');
                    const bestMove = parts[1]; 
                    
                    if (bestMove && bestMove !== '(none)' && game) {
                        game.move({ 
                            from: bestMove.substring(0, 2), 
                            to: bestMove.substring(2, 4), 
                            promotion: bestMove.substring(4, 5) || 'q' 
                        });
                        if (board) board.position(game.fen());
                        checkGameStatus();
                        giveCoachFeedback();
                    }
                }
            };
        }

        function giveCoachFeedback() {
            if (!game) return;
            let history = game.history({ verbose: true });
            if (history.length === 0) return;
            let lastMove = history[history.length - 1];
            if (lastMove.san.includes('+')) {
                document.getElementById('coach').innerText = "Coach: Nice check! Keep up tactical pressure.";
            } else if (lastMove.captured) {
                document.getElementById('coach').innerText = "Coach: Clean capture.";
            } else {
                document.getElementById('coach').innerText = "Coach: Solid development.";
            }
        }

        function checkGameStatus() {
            if (!game) return;
            if (game.in_checkmate()) {
                stats.gamesPlayed++;
                if (game.turn() === 'b') { 
                    stats.winStreak++;
                    document.getElementById('coach').innerText = "Victory! Advancing difficulty.";
                    if(stats.skillLevel < 20) stats.skillLevel++;
                } else { 
                    stats.winStreak = 0;
                    document.getElementById('coach').innerText = "Checkmate. Analyze your defenses.";
                }
                saveProgress();
            } else if (game.in_draw()) {
                stats.gamesPlayed++;
                document.getElementById('coach').innerText = "Game drawn.";
                saveProgress();
            }
        }

        function resetGame() {
            if (game) game.reset();
            if (board) board.start();
            document.getElementById('coach').innerText = "New match started. Control center squares.";
        }

        const config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd,
            pieceTheme: 'https://chessboardjs.com{piece}.png'
        };

        $(document).ready(function() {
            board = Chessboard('board', config);
            document.getElementById('resetBtn').addEventListener('click', resetGame);
            loadProgress();
        });
    </script>
</body>
</html>
