<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Chess Trainer</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <h1>My Chess Trainer</h1>

  <div id="start-screen">
    <button id="start-btn">Start Game</button>
  </div>

  <div id="game-screen" style="display:none;">
    <div id="board"></div>
    <div id="trainer-panel">
      <h2>Trainer Feedback</h2>
      <div id="feedback"></div>
    </div>
  </div>

  <!-- Stockfish WASM via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/stockfish@16.1.0/dist/stockfish.js"></script>

  <!-- Main app -->
  <script src="app.js"></script>
</body>
</html>
